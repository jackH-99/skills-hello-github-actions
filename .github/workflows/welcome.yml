name: Post welcome comment
on:
  pull_request:
  types: [opened]
  permissions:
  pull-requests: write
  jobs:
    welcome: 
    name: Post welcome comment
    runs-on: ubuntu-latest
    steps:
      - run: gh or pr comment "$PR_URL" --body "Welcome to the repository!"branch_protection_rule: 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}}
        PR_URL: ${{ github.event.pull_requeest.html_url }}
